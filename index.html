    background-size: cover;
    background-position: center top;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  .app { max-width: 600px; margin: 0 auto; padding: 20px 18px 80px; min-height: 100vh; }
  .hidden { display: none !important; }

  /* Typography */
  h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  h3 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 18px; font-weight: 700; }

  /* Login / member picker */
  .login-screen { text-align: center; padding: 40px 20px; }
  .login-screen .club-logo {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px;
  }
  .login-screen .club-icon { font-size: 60px; margin-bottom: 16px; }
  .login-screen h1 { font-size: 32px; margin-bottom: 8px; }
  .login-screen p { color: var(--ink-soft); margin-bottom: 24px; }
  .search-box {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 14px;
    font-size: 16px;
    width: 100%;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .search-box:focus { outline: none; border-color: var(--primary); }
  .member-list {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    overflow: hidden;
    max-height: 60vh;
    overflow-y: auto;
  }
  .member-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.1s;
  }
  .member-list-item:last-child { border-bottom: none; }
  .member-list-item:hover { background: var(--bg); }
  .member-list-item:active { background: var(--primary-dim); }
  .member-list-item.admin {
    background: linear-gradient(to right, var(--secondary-dim) 0%, transparent 100%);
  }
  .member-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--primary-dim); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .member-list-item.admin .member-avatar { background: var(--secondary); color: white; }
  .member-meta { flex: 1; min-width: 0; }
  .member-name { font-weight: 500; font-size: 15px; }
  .member-email { font-size: 12px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-badge {
    font-size: 10px; background: var(--secondary); color: white;
    padding: 2px 6px; border-radius: 4px;
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--ink-soft);
  }
  .empty-state.first-run {
    background: var(--paper);
    border: 2px dashed var(--ink);
    border-radius: 16px;
    padding: 32px 24px;
  }

  /* Header / nav */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
    color: white;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .header h1 { color: white; }
  .header .club-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.9);
  }
  .header .user-info { display: flex; align-items: center; gap: 8px; }
  .user-info-text { text-align: right; }
  .user-info-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 14px; }
  .user-info-role { font-size: 11px; color: var(--ink-soft); }
  .logout-btn {
    background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
    color: white; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .logout-btn:hover { background: rgba(255, 255, 255, 0.35); }

  /* Mode switcher (admin can switch to member view) */
  .mode-switcher {
    display: flex; gap: 4px;
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid var(--ink); border-radius: 12px; padding: 4px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }
  .mode-switcher button {
    flex: 1; background: none; border: none;
    padding: 8px; border-radius: 8px;
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600;
    font-size: 13px; cursor: pointer; color: var(--ink-soft);
  }
  .mode-switcher button.active {
    background: var(--ink); color: var(--paper);
  }

  /* Account card */
  .account {
    background: var(--paper-translucent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1.5px solid var(--ink);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .account.warning { background: var(--warning-bg); border-color: var(--warning); box-shadow: 4px 4px 0 var(--warning); }
  .account.credit { background: var(--green-dim); border-color: var(--green); box-shadow: 4px 4px 0 var(--green); }
  .account-label {
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .account-balance {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 44px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1; margin-bottom: 4px;
  }
  .account-balance.warning-color { color: var(--warning); }
  .account-balance.positive { color: var(--green); }
  .account-status { font-size: 14px; color: var(--ink-soft); font-weight: 500; }
  .account-projection {
    margin-top: 12px;
    padding: 8px 12px;
    background: rgba(26, 95, 90, 0.08);
    border-left: 3px solid var(--primary);
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
  }
  .account-warning {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--warning); font-size: 14px;
  }
  .account-warning strong { display: block; margin-bottom: 6px; color: var(--warning); }
  .account-warning.green { border-color: var(--green); }
  .account-warning.green strong { color: var(--green); }
  .bank-info {
    background: var(--paper); border: 1px solid var(--warning); border-radius: 10px;
    padding: 10px 12px; margin-top: 10px;
    font-family: 'Bricolage Grotesque', monospace; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center; font-size: 14px;
  }
  .copy-btn {
    background: var(--warning); color: white; border: none;
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .copy-btn.copied { background: var(--green); }

  /* Section title */
  .section-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: white;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    margin-bottom: 12px; margin-top: 24px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.4); }
  .section-title .action-link {
    text-decoration: none; color: var(--accent);
    font-size: 12px; font-weight: 700;
    cursor: pointer;
  }
  .section-title .action-link::after { display: none; }

  /* Training cards */
  .training {
    background: var(--paper-translucent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1.5px solid var(--ink);
    border-radius: 18px; padding: 16px;
    margin-bottom: 12px; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(15, 32, 39, 0.15);
  }
  .training.registered { background: var(--green-dim); border-color: var(--green); }
  .training.declined-explicit {
    background: linear-gradient(135deg, rgba(252, 229, 212, 0.95) 0%, rgba(255, 255, 255, 0.92) 100%);
    border-color: var(--warning);
    opacity: 0.92;
  }
  .training.declined-explicit .training-date,
  .training.declined-explicit .training-venue {
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
    text-decoration-color: rgba(184, 92, 47, 0.5);
  }
  .training.declined-explicit .training-date .day {
    background: var(--warning);
    text-decoration: none;
  }
  .training.declined { opacity: 0.55; }
  .training.locked { background: #ede6d6; border-style: dashed; }
  .training-date {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .training-date .day {
    text-transform: uppercase; font-size: 11px;
    background: var(--ink); color: var(--paper);
    padding: 2px 8px; border-radius: 5px; margin-right: 6px;

<body>

<div class="app" id="app"></div>

<button class="fab hidden" id="fab" onclick="onFabClick()">+</button>
<div class="toast" id="toast"></div>

<script>
// ============================================
// SUPABASE KONFIGURACE
// ============================================
const SUPABASE_URL = 'https://opyhlmtgyuuatevwyfpl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KYRaGl-FYPmBPB185Y3Plw_YpemIWOn';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================
// STATE (in-memory cache, synced from Supabase)
// ============================================
const state = {
  setup: null,
  members: [],
  trainings: [],
  transactions: [],
  currentUserId: null,
  currentView: 'member',
  adminTab: 'dashboard',
  ui: { historyView: false, selectedMemberId: null, selectedTrainingId: null }
};

// ============================================
// DATA LOADING FROM SUPABASE
// ============================================
async function loadAllData() {
  console.log('🔄 Loading data from Supabase...');
  console.log('   URL:', SUPABASE_URL);
  try {
    // Settings (jeden řádek)
    const { data: settingsRow, error: sErr } = await db
      .from('settings').select('*').eq('id', 1).maybeSingle();
    if (sErr) {
      console.error('❌ Settings error:', sErr);
      alert('❌ CHYBA NAČÍTÁNÍ NASTAVENÍ:\n\n' + sErr.message + '\n\nMožné příčiny:\n- Špatný API klíč\n- Tabulka nebyla vytvořena\n- Špatná URL\n\nDetail: ' + JSON.stringify(sErr));
    }
    console.log('📋 Settings row:', settingsRow);
    if (settingsRow && settingsRow.is_setup) {
      state.setup = {
        isSetup: true,
        clubName: settingsRow.club_name,
        bankAccount: settingsRow.bank_account || '',
        debtLimit: settingsRow.debt_limit ?? -500,
        creditLimit: settingsRow.credit_limit ?? 500
      };
    }

    // Members
    const { data: membersData, error: mErr } = await db
      .from('members').select('*').order('name');
    if (mErr) {
      console.error('❌ Members error:', mErr);
      alert('❌ CHYBA NAČÍTÁNÍ ČLENŮ:\n\n' + mErr.message);
    }
    console.log('👥 Members loaded:', (membersData || []).length);
    state.members = (membersData || []).map(m => ({
      id: m.id,
      name: m.name,
      email: m.email,
      phone: m.phone || '',
      isAdmin: m.is_admin,
      isActive: m.is_active !== false,
      balance: m.balance || 0,
      createdAt: m.created_at
    }));

    // SAFETY: Pokud existují členové ale chybí setup row, znamená to, že systém už je nastaven.
    if (state.members.length > 0 && !state.setup) {
      console.warn('⚠ Members exist but no setup row - using defaults');
      state.setup = {
        isSetup: true,
        clubName: 'NaturClimb',
        bankAccount: '',
        debtLimit: -500,
        creditLimit: 500
      };
      try { await saveSetup(); } catch (e) { console.error(e); }
    }

    // Trainings
    const { data: trainingsData, error: tErr } = await db
      .from('trainings').select('*').order('datetime');
    if (tErr) {
      console.error('❌ Trainings error:', tErr);
      alert('❌ CHYBA NAČÍTÁNÍ TRÉNINKŮ:\n\n' + tErr.message);
    }
    console.log('🧗 Trainings loaded:', (trainingsData || []).length);
    state.trainings = (trainingsData || []).map(t => ({
      id: t.id,
      datetime: t.datetime,
      venue: t.venue,
      price: t.price,
      status: t.status,
      registrations: t.registrations || [],
      declined: t.declined || [],
      attendedIds: t.attended_ids || [],
      _settlementAttendees: t.settlement_attendees,
      settledAt: t.settled_at,
      createdAt: t.created_at
    }));

    // Transactions
    const { data: txData, error: txErr } = await db
      .from('transactions').select('*').order('created_at', { ascending: false });
    if (txErr) {
      console.error('❌ Transactions error:', txErr);
    }
    console.log('💰 Transactions loaded:', (txData || []).length);
    state.transactions = (txData || []).map(tx => ({
      id: tx.id,
      memberId: tx.member_id,
      amount: tx.amount,
      type: tx.type,
      description: tx.description || '',
      trainingId: tx.training_id,
      balanceAfter: tx.balance_after,
      createdBy: tx.created_by,
      createdAt: tx.created_at
    }));

    state.members.forEach(m => recalcBalance(m.id));
    console.log('✅ All data loaded successfully');
  } catch (err) {
    console.error('❌ Failed to load data:', err);
    alert('❌ ZÁSADNÍ CHYBA NAČÍTÁNÍ DAT:\n\n' + err.message + '\n\nZkontroluj F12 → Console.');
  }

  // Session (lokálně v prohlížeči)
  const session = localStorage.getItem('currentUserId');
  if (session) state.currentUserId = session;
}

// ============================================
// SAVE / SYNC TO SUPABASE
// ============================================
async function saveSetup() {
  if (!state.setup) return;
  const { error } = await db.from('settings').upsert({
    id: 1,
    club_name: state.setup.clubName,
    bank_account: state.setup.bankAccount || '',
    debt_limit: state.setup.debtLimit,
    credit_limit: state.setup.creditLimit,
    is_setup: true,
    updated_at: new Date().toISOString()
  });
  if (error) {
    console.error('saveSetup error:', error);
    alert('❌ CHYBA UKLÁDÁNÍ NASTAVENÍ:\n\n' + error.message + '\n\nDetail: ' + JSON.stringify(error));
  } else {
    console.log('✅ Setup saved to Supabase');
  }
}

async function saveMember(member) {
  const { error } = await db.from('members').upsert({
    id: member.id,
    name: member.name,
    email: member.email,
    phone: member.phone || '',
    is_admin: member.isAdmin || false,
    is_active: member.isActive !== false,
    balance: member.balance || 0
  });
  if (error) {
    console.error('saveMember error:', error);
    alert('❌ CHYBA UKLÁDÁNÍ ČLENA:\n\n' + error.message + '\n\nDetail: ' + JSON.stringify(error));
  } else {
    console.log('✅ Member saved:', member.name);
  }
}

async function saveMembersBulk(members) {
  const rows = members.map(m => ({
    id: m.id,
    name: m.name,
    email: m.email,
    phone: m.phone || '',
    is_admin: m.isAdmin || false,
    is_active: m.isActive !== false,
    balance: m.balance || 0
  }));
  const { error } = await db.from('members').upsert(rows);
  if (error) console.error('saveMembersBulk:', error);
}

async function deleteMemberFromDb(memberId) {
  await db.from('transactions').delete().eq('member_id', memberId);
  // Remove from trainings registrations
  for (const t of state.trainings) {
    if (t.registrations.includes(memberId) || (t.declined || []).includes(memberId)) {
      await saveTraining(t);
    }
  }
  const { error } = await db.from('members').delete().eq('id', memberId);
  if (error) console.error('deleteMember:', error);
}

async function saveTraining(training) {
  const { error } = await db.from('trainings').upsert({
    id: training.id,
    datetime: training.datetime,
    venue: training.venue,
    price: training.price || 0,
    status: training.status || 'open',
    registrations: training.registrations || [],
    declined: training.declined || [],
    attended_ids: training.attendedIds || [],
    settlement_attendees: training._settlementAttendees || null,
    settled_at: training.settledAt || null
  });
  if (error) { console.error('saveTraining:', error); showToast('Chyba ukládání tréninku'); }
}

async function deleteTrainingFromDb(trainingId) {
  await db.from('transactions').delete().eq('training_id', trainingId);
  const { error } = await db.from('trainings').delete().eq('id', trainingId);
  if (error) console.error('deleteTraining:', error);
}

async function saveTransaction(tx) {
  const { error } = await db.from('transactions').upsert({
    id: tx.id,
    member_id: tx.memberId,
    amount: tx.amount,
    type: tx.type,
    description: tx.description || '',
    training_id: tx.trainingId || null,
    balance_after: tx.balanceAfter,
    created_by: tx.createdBy || null,
    created_at: tx.createdAt
  });
  if (error) { console.error('saveTransaction:', error); showToast('Chyba ukládání pohybu'); }
}

async function deleteTransactionsByTraining(trainingId) {
  const { error } = await db.from('transactions').delete().eq('training_id', trainingId);
  if (error) console.error('deleteTransactionsByTraining:', error);
}

// Legacy API for compatibility - dispatches to proper save functions
async function saveState(key) {
  if (key === 'setup') {
    await saveSetup();
  } else if (key === 'members') {
    // Save all members (their balance may have changed)
    for (const m of state.members) await saveMember(m);
  } else if (key === 'trainings') {
    // Save all trainings
    for (const t of state.trainings) await saveTraining(t);
  } else if (key === 'transactions') {
    // Transactions are saved via addTransaction directly
    // For bulk operations, we save them all here
    for (const tx of state.transactions) await saveTransaction(tx);
  }
}

function setCurrentUser(userId) {
  state.currentUserId = userId;
  if (userId) localStorage.setItem('currentUserId', userId);
  else localStorage.removeItem('currentUserId');
}

async function resetAllData() {
  await db.from('transactions').delete().neq('id', '___never___');
  await db.from('trainings').delete().neq('id', '___never___');
  await db.from('members').delete().neq('id', '___never___');
  await db.from('settings').delete().eq('id', 1);
  state.setup = null;
  state.members = [];
  state.trainings = [];
  state.transactions = [];
  setCurrentUser(null);
}

// ============================================
// HELPERS
// ============================================
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatKc(amount) {
  const sign = amount > 0 ? '+' : '';
  return `${sign}${amount.toLocaleString('cs-CZ')} Kč`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
}

function formatDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('cs-CZ', { weekday: 'short', day: 'numeric', month: 'numeric' }) +
    ' ' + d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

function formatTrainingDate(iso) {
  const d = new Date(iso);
  const days = ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'];
  const day = days[d.getDay()];
  return `${day} ${d.getDate()}.${d.getMonth() + 1}.`;
}

function formatTrainingTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function getCurrentUser() {
  return state.members.find(m => m.id === state.currentUserId);
}

function isAdmin() {
  const u = getCurrentUser();
  return u && u.isAdmin;
}

function getMember(id) {
  return state.members.find(m => m.id === id);
}

function getTraining(id) {
  return state.trainings.find(t => t.id === id);
}

function isRegistered(trainingId, memberId) {
  const t = getTraining(trainingId);
  return t && t.registrations.includes(memberId);
}

function isDeclined(trainingId, memberId) {
  const t = getTraining(trainingId);
  return t && t.declined && t.declined.includes(memberId);
}

function isPastDeadline(training) {
  // Pro člena: uzávěrka je v 21:00 dne tréninku
  // Po tomto čase se nemůže přihlašovat/odhlašovat
  const t = new Date(training.datetime);
  const deadline = new Date(t.getFullYear(), t.getMonth(), t.getDate(), 21, 0, 0);
  return new Date() > deadline;
}

function isSettled(training) {
  return training.status === 'settled';
}

function isTrainingPast(training) {
  return new Date(training.datetime) < new Date();
}

function getMemberHistory(memberId) {
  return state.transactions
    .filter(t => t.memberId === memberId)
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

function recalcBalance(memberId) {
  const txs = state.transactions.filter(t => t.memberId === memberId);
  const balance = txs.reduce((sum, t) => sum + t.amount, 0);
  const member = getMember(memberId);
  if (member) member.balance = balance;
  return balance;
}

async function addTransaction(data) {
  const tx = {
    id: genId(),
    createdAt: new Date().toISOString(),
    ...data
  };
  state.transactions.unshift(tx);  // unshift = sorted desc by createdAt
  const newBalance = recalcBalance(data.memberId);
  tx.balanceAfter = newBalance;

  // Save tx and updated member balance to Supabase
  await saveTransaction(tx);
  const member = getMember(data.memberId);
  if (member) await saveMember(member);

  return tx;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function getSettings() {
  return state.setup || {
    clubName: 'NaturClimb',
    bankAccount: '',
    debtLimit: -500,
    creditLimit: 500
  };
}

// ============================================
// RENDER ROUTER
// ============================================
function render() {
  const app = document.getElementById('app');
  const fab = document.getElementById('fab');

  if (!state.setup) {
    app.innerHTML = renderSetup();
    fab.classList.add('hidden');
    return;
  }
  if (!state.currentUserId) {
    app.innerHTML = renderLogin();
    fab.classList.add('hidden');
    return;
  }

  const user = getCurrentUser();
  if (!user) {
    setCurrentUser(null);
    render();
    return;
  }

  if (user.isAdmin && state.currentView === 'admin') {
    app.innerHTML = renderAdmin();
    updateFab();
  } else {
    app.innerHTML = renderMember();
    fab.classList.add('hidden');
  }
}

function updateFab() {
  const fab = document.getElementById('fab');
  if (state.adminTab === 'trainings' || state.adminTab === 'members' || state.adminTab === 'dashboard') {
    fab.classList.remove('hidden');
  } else {
    fab.classList.add('hidden');
  }
}

function onFabClick() {
  if (state.adminTab === 'trainings') openTrainingForm();
  if (state.adminTab === 'members') openMemberForm();
  if (state.adminTab === 'dashboard') openTrainingForm();
}

async function finishSetup() {
  const clubName = document.getElementById('setup-clubname').value.trim();
  const bank = document.getElementById('setup-bank').value.trim();
  const adminName = document.getElementById('setup-admin-name').value.trim();
  const adminEmail = document.getElementById('setup-admin-email').value.trim().toLowerCase();

  if (!clubName || !adminName) {
    showToast('Vyplň prosím název oddílu a své jméno');
    return;
  }
  if (!adminEmail || !adminEmail.includes('@') || !adminEmail.includes('.')) {
    showToast('Email je povinný – přihlašuješ se přes něj');
    return;
  }

  // SAFETY CHECK: Před spuštěním setupu se ujistíme že databáze je opravdu prázdná
  // (předchází přepsání už nastavené aplikace)
  try {
    const { data: existingMembers, error } = await db.from('members').select('id, email').limit(5);
    if (!error && existingMembers && existingMembers.length > 0) {
      const matchingMember = existingMembers.find(m => m.email && m.email.toLowerCase() === adminEmail);
      if (matchingMember) {
        showToast('Tento email už v aplikaci existuje. Přihlaš se na hlavní obrazovce.');
      } else {
        showToast('Aplikace už je nastavena. Obnov stránku (F5).');
      }
      // Force reload to refresh state
      setTimeout(() => location.reload(), 2000);
      return;
    }
  } catch (e) {
    console.error('Safety check failed:', e);
  }

  state.setup = {
    isSetup: true,
    clubName,
    bankAccount: bank,
    debtLimit: -500,
    creditLimit: 500
  };

  const admin = {
    id: genId(),
    name: adminName,
    email: adminEmail,
    isAdmin: true,
    balance: 0,
    createdAt: new Date().toISOString()
  };
  state.members.push(admin);
  setCurrentUser(admin.id);
  state.currentView = 'admin';

  await saveSetup();
  await saveMember(admin);
  showToast('Aplikace připravena! Vítej ' + adminName + ' 👋');
  render();
}

function tryLoginByEmail() {
  const input = document.getElementById('login-email');
  const errorEl = document.getElementById('login-error');
  const email = input.value.trim().toLowerCase();

  if (!email) {
    showLoginError('Zadej svůj email');
    return;
  }

  if (!email.includes('@') || !email.includes('.')) {
    showLoginError('Zadej platný email (např. petr@example.cz)');
    return;
  }

  // RATE LIMITING: Zpoždění 1 sekunda aby nedávalo smysl brute-force
  input.disabled = true;
  let countdown = 1;
  const originalText = input.value;
  
  const timer = setInterval(() => {
    countdown--;
    if (countdown === 0) {
      clearInterval(timer);
      input.disabled = false;
    }
  }, 1000);

  // Najdi člena s tímto emailem
  const member = state.members.find(m => m.email && m.email.toLowerCase() === email);

  if (!member) {
    showLoginError('Tento email v systému nenajdu. Zkontroluj překlep nebo požádej admina o přidání.');
    setTimeout(() => {
      input.disabled = false;
      clearInterval(timer);
    }, 1000);
    return;
  }

  // Nalezen → přihlásit
  setTimeout(() => {
    setCurrentUser(member.id);
    state.currentView = member.isAdmin ? 'admin' : 'member';
    showToast(`Vítej, ${member.name}! 👋`);
    render();
  }, 1000);
}

function showLoginError(msg) {
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

function filterMembers(q) {
  const items = document.querySelectorAll('.member-list-item');
  const query = q.toLowerCase().trim();
  items.forEach(item => {
    const name = item.querySelector('.member-name').textContent.toLowerCase();
    item.style.display = name.includes(query) ? '' : 'none';
  });
}

// ============================================
// MEMBER VIEW
// ============================================
function renderMember() {
  const user = getCurrentUser();
  const settings = getSettings();
  const balance = recalcBalance(user.id);

  if (state.ui.historyView) {
    return renderMemberHistory();
  }

  let accountClass = '';
  let balanceClass = '';
  let warning = '';

  if (balance < settings.debtLimit) {
    accountClass = 'warning';
    balanceClass = 'warning-color';
    if (settings.bankAccount) {
      warning = `
        <div class="account-warning">
          <strong>⚠ Prosíme dorovnej konto</strong>
          Hotově na příštím tréninku, nebo bankou:
          <div class="bank-info">
            <span>${settings.bankAccount}</span>
            <button class="copy-btn" onclick="copyBank(event, '${settings.bankAccount}')">Kopírovat</button>
          </div>
        </div>`;
    } else {
      warning = `
        <div class="account-warning">
          <strong>⚠ Prosíme dorovnej konto</strong>
          Domluv se s adminem na platbě.
        </div>`;
    }
  } else if (balance > settings.creditLimit) {
    accountClass = 'credit';
    balanceClass = 'positive';
    warning = `
      <div class="account-warning green">
        <strong>💰 Velký přeplatek</strong>
        Pokud chceš peníze vrátit, ozvi se adminovi. Jinak se použijí na příští tréninky.
      </div>`;
  }

  // Pohled člena: ukáže všechny nezúčtované tréninky (i ty co proběhly - admin ještě nezúčtoval)
  // Řazení: nadcházející od nejbližšího, pak proběhlé od nejnovějšího
  const allOpen = state.trainings
    .filter(t => t.status !== 'settled')
    .sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
  const upcoming = allOpen;

  // Projected balance: pokud Milan jde na tréninky, co s kontem bude
  const projectedDelta = upcoming
    .filter(t => t.registrations.includes(user.id))
    .reduce((sum, t) => sum - t.price, 0);
  const projectedBalance = balance + projectedDelta;
  const hasUpcomingRegistrations = projectedDelta !== 0;

  return `
    ${renderHeader()}
    ${user.isAdmin ? renderModeSwitcher() : ''}

    <div class="account ${accountClass}">
      <div class="account-label">Moje konto</div>
      <div class="account-balance ${balanceClass}">${formatKc(balance)}</div>
      <div class="account-status">${
        balance < settings.debtLimit ? 'Dluh přesáhl limit' :
        balance > settings.creditLimit ? 'Vysoký přeplatek' : 'V pořádku'
      }</div>
      ${hasUpcomingRegistrations ? `
        <div class="account-projection">
          Když na přihlášené tréninky přijdeš, bude ${formatKc(projectedBalance)}
        </div>
      ` : ''}
      ${warning}
    </div>

    <div class="section-title">Nadcházející tréninky</div>

    ${upcoming.length === 0 ? `
      <div class="empty-msg">
        <div class="icon">🧗</div>
        <div>Žádné tréninky nejsou naplánované.</div>
      </div>
    ` : upcoming.map(t => renderTrainingCard(t, user.id)).join('')}

    <div style="margin-top: 24px;">
      <button class="btn btn-secondary" style="width: 100%;" onclick="showHistory()">
        📜 Historie konta →
      </button>
    </div>
  `;
}

function renderTrainingCard(t, userId) {
  const registered = isRegistered(t.id, userId);
  const declined = isDeclined(t.id, userId);
  const pastDeadline = isPastDeadline(t);
  const count = t.registrations.length;
  const word = count === 1 ? 'přihlášený' : (count >= 2 && count <= 4 ? 'přihlášení' : 'přihlášených');

  let priceClass = 'free';
  let priceText = 'Zdarma';
  if (t.price > 0) {
    priceClass = 'charge';
    priceText = `−${t.price} Kč z konta`;
  } else if (t.price < 0) {
    priceClass = 'reward';
    priceText = `+${Math.abs(t.price)} Kč na konto`;
  }

  const settled = isSettled(t);
  let cardClass = 'training';
  if (registered) cardClass += ' registered';
  if (declined) cardClass += ' declined-explicit';
  if (settled || pastDeadline) cardClass += ' locked';

  let actions = '';
  if (settled) {
    // Trénink je zúčtovaný - nelze měnit
    if (registered) {
      actions = `
        <div class="registered-status">✓ Účast zaúčtována</div>
        <div class="lock-notice" style="margin-top: 8px;">🔒 Trénink byl zúčtován</div>
      `;
    } else {
      actions = `<div class="lock-notice">🔒 Trénink byl zúčtován</div>`;
    }
  } else if (pastDeadline) {
    // Po 21:00 dne tréninku - člen nemůže měnit
    if (registered) {
      actions = `
        <div class="registered-status">✓ Jsi přihlášen</div>
        <div class="lock-notice" style="margin-top: 8px;">🔒 Uzávěrka prošla (21:00)</div>
      `;
    } else if (declined) {
      actions = `<div class="lock-notice">🔒 Uzávěrka prošla – nejdeš</div>`;
    } else {
      actions = `<div class="lock-notice">🔒 Uzávěrka prošla (21:00)</div>`;
    }
  } else if (registered) {
    actions = `
      <div class="registered-status">✓ Jsi přihlášen</div>
      <button class="btn btn-decline" style="width: 100%; margin-top: 8px;" onclick="resetTrainingChoice('${t.id}')">Změnit</button>
    `;
  } else if (declined) {
    actions = `
      <div class="declined-status-box">✕ Nejdeš na tento trénink</div>
      <button class="btn btn-go" style="width: 100%; margin-top: 8px;" onclick="goTraining('${t.id}')">Změnit – Jdu</button>
    `;
  } else {
    actions = `
      <div class="training-actions">
        <button class="btn btn-decline" onclick="declineTraining('${t.id}')">Nejdu</button>
        <button class="btn btn-go" onclick="goTraining('${t.id}')">✓ Jdu</button>
      </div>
    `;
  }

  return `
    <div class="${cardClass}">
      <div class="training-date">
        <span class="day">${formatTrainingDate(t.datetime)}</span>${formatTrainingTime(t.datetime)}
      </div>
      <div class="training-venue">📍 ${t.venue}</div>
      <div class="training-meta">
        <span class="training-price ${priceClass}">${priceText}</span>
        <span class="training-attendees" onclick="showAttendeesModal('${t.id}')">👥 ${count} ${word}</span>
      </div>
      ${actions}
    </div>
  `;
}

function goTraining(trainingId) {
  return doGoTraining(trainingId);
}

async function doGoTraining(trainingId) {
  const t = getTraining(trainingId);
  if (!t) return;
  if (isSettled(t)) {
    showToast('Trénink už byl zúčtován');
    return;
  }
  if (isPastDeadline(t)) {
    showToast('Uzávěrka už prošla (21:00 dne tréninku)');
    return;
  }
  const userId = state.currentUserId;
  if (!t.registrations.includes(userId)) {
    t.registrations.push(userId);
  }
  if (t.declined) t.declined = t.declined.filter(id => id !== userId);
  await saveTraining(t);
  showToast('✅ Přihlášeno na trénink');
  render();
}

async function declineTraining(trainingId) {
  const t = getTraining(trainingId);
  if (!t) return;
  if (isSettled(t)) {
    showToast('Trénink už byl zúčtován');
    return;
  }
  if (isPastDeadline(t)) {
    showToast('Uzávěrka už prošla (21:00 dne tréninku)');
    return;
  }
  const userId = state.currentUserId;
  t.registrations = t.registrations.filter(id => id !== userId);
  if (!t.declined) t.declined = [];
  if (!t.declined.includes(userId)) t.declined.push(userId);
  await saveTraining(t);
  showToast('✕ Označeno: nejdeš');
  render();
}

async function resetTrainingChoice(trainingId) {
  const t = getTraining(trainingId);
  if (!t) return;
  if (isSettled(t) || isPastDeadline(t)) return;
  const userId = state.currentUserId;
  t.registrations = t.registrations.filter(id => id !== userId);
  if (t.declined) t.declined = t.declined.filter(id => id !== userId);
  await saveTraining(t);
  render();
}

function showAttendeesModal(trainingId) {
  const t = getTraining(trainingId);
  if (!t) return;
  const userId = state.currentUserId;
  const attendees = t.registrations
    .map(id => getMember(id))
    .filter(Boolean)
    .sort((a, b) => {
      if (a.id === userId) return -1;
      if (b.id === userId) return 1;
      return a.name.localeCompare(b.name);
    });

  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header">
      <div class="modal-title">Kdo se přihlásil</div>
      <div class="modal-subtitle">

    btn.classList.remove('copied');
  }, 1500);
}

function openTrainingForm(editId) {
  const editing = editId ? getTraining(editId) : null;

  // Smart prefill: pokud editujeme, použij datum tréninku.
  // Pokud vytváříme nový, najdi nejnovější trénink (i v minulosti) a přidej 7 dní.
  // Pokud žádný neexistuje, použij příští úterý 18:00.
  let prefillDate;
  if (editing) {
    prefillDate = new Date(editing.datetime);
  } else if (state.trainings.length > 0) {
    // Vezmi nejnovější trénink (podle data, ne podle vytvoření)
    const sorted = [...state.trainings].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
    const latest = new Date(sorted[0].datetime);
    prefillDate = new Date(latest);
    prefillDate.setDate(prefillDate.getDate() + 7); // +1 týden
  } else {
    // Žádný trénink ještě nebyl: najdi příští úterý 18:00
    prefillDate = new Date();
    prefillDate.setHours(18, 0, 0, 0);
    const dayOfWeek = prefillDate.getDay(); // 0=Ne, 1=Po, 2=Út, ...
    let daysToTuesday = (2 - dayOfWeek + 7) % 7;
    if (daysToTuesday === 0 && new Date().getHours() >= 18) daysToTuesday = 7; // dnes je úterý po 18h → příští úterý
    prefillDate.setDate(prefillDate.getDate() + daysToTuesday);
  }

  // Převést na local datetime string ve formátu YYYY-MM-DDTHH:MM
  const pad = n => String(n).padStart(2, '0');
  const dateValue = `${prefillDate.getFullYear()}-${pad(prefillDate.getMonth()+1)}-${pad(prefillDate.getDate())}T${pad(prefillDate.getHours())}:${pad(prefillDate.getMinutes())}`;

  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header">
      <div class="modal-title">${editing ? 'Upravit trénink' : 'Nový trénink'}</div>
    </div>

    <div class="form-group">
      <label>Datum a čas</label>
      <input type="datetime-local" id="t-datetime" value="${dateValue}">
    </div>

    <div class="form-group">
      <label>Místo</label>
      <input type="text" id="t-venue" placeholder="Např. Lezecká stěna Smíchov" value="${editing ? editing.venue : ''}">
    </div>

    <div class="form-group">
      <label>Vliv na konto účastníků</label>
      <div class="radio-group">
        <label class="radio-option ${(!editing || editing.price > 0) ? 'selected' : ''}" onclick="selectPriceType('charge', this)">
          <input type="radio" name="price-type" value="charge" ${(!editing || editing.price > 0) ? 'checked' : ''}>
          <span>Odečte z konta:</span>
          <input type="number" id="t-price-charge" placeholder="100" min="0" value="${editing && editing.price > 0 ? editing.price : (!editing ? '100' : '')}" style="flex: 1; padding: 4px 8px; border: 1px solid var(--line); border-radius: 6px; margin-left: auto;">
          <span>Kč</span>
        </label>
        <label class="radio-option ${(editing && editing.price < 0) ? 'selected' : ''}" onclick="selectPriceType('reward', this)">
          <input type="radio" name="price-type" value="reward" ${(editing && editing.price < 0) ? 'checked' : ''}>
          <span>Přičte na konto:</span>
          <input type="number" id="t-price-reward" placeholder="100" min="0" value="${editing && editing.price < 0 ? Math.abs(editing.price) : (!editing ? '100' : '')}" style="flex: 1; padding: 4px 8px; border: 1px solid var(--line); border-radius: 6px; margin-left: auto;">
          <span>Kč</span>
        </label>
        <label class="radio-option ${(editing && editing.price === 0) ? 'selected' : ''}" onclick="selectPriceType('free', this)">
          <input type="radio" name="price-type" value="free" ${(editing && editing.price === 0) ? 'checked' : ''}>
          <span>Bez vlivu (zdarma)</span>
        </label>
      </div>
    </div>

    <div class="form-actions">
      ${editing ? `<button class="btn btn-danger" onclick="deleteTraining('${editing.id}')">Smazat</button>` : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Zrušit</button>
      <button class="btn btn-primary" onclick="saveTrainingForm('${editId || ''}')">${editing ? 'Uložit' : 'Vytvořit'}</button>
    </div>
  `;
  openModal(html);
}

function selectPriceType(type, el) {
  document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

async function saveTrainingForm(editId) {
  const datetime = document.getElementById('t-datetime').value;
  const venue = document.getElementById('t-venue').value.trim();
  const priceType = document.querySelector('input[name="price-type"]:checked').value;
  let price = 0;
  if (priceType === 'charge') price = parseInt(document.getElementById('t-price-charge').value) || 0;
  else if (priceType === 'reward') price = -(parseInt(document.getElementById('t-price-reward').value) || 0);

  if (!datetime || !venue) {
    showToast('Vyplň datum a místo');
    return;
  }

  const dt = new Date(datetime);
  let training;

  if (editId) {
    training = getTraining(editId);
    training.datetime = dt.toISOString();
    training.venue = venue;
    training.price = price;
  } else {
    training = {
      id: genId(),
      datetime: dt.toISOString(),
      venue,
      price,
      status: 'open',
      registrations: [],
      declined: [],
      createdAt: new Date().toISOString()
    };
    state.trainings.push(training);
  }

  await saveTraining(training);
  closeModal();
  showToast(editId ? 'Trénink uložen' : 'Trénink vytvořen ✓');
  render();
}

async function deleteTraining(id) {
  if (!confirm('Opravdu smazat tento trénink?')) return;
  const txsToRemove = state.transactions.filter(tx => tx.trainingId === id);
  state.transactions = state.transactions.filter(tx => tx.trainingId !== id);
  state.trainings = state.trainings.filter(t => t.id !== id);
  // Recalc affected members
  const affectedMembers = new Set(txsToRemove.map(tx => tx.memberId));
  affectedMembers.forEach(mid => recalcBalance(mid));

  // Delete from Supabase
  await deleteTrainingFromDb(id);
  // Update balances of affected members in Supabase
  for (const mid of affectedMembers) {
    const member = getMember(mid);
    if (member) await saveMember(member);
  }
  closeModal();
  showToast('Trénink smazán');
  render();
}

async function unsettleTraining(trainingId) {
  const t = getTraining(trainingId);
  if (!t || !isSettled(t)) return;

  if (!confirm('Vrátit zúčtování?\n\nVšechny pohyby na kontech vázané na tento trénink budou smazány. Trénink se vrátí do stavu k zúčtování, kde můžeš upravit kdo přišel a znovu zúčtovat.')) return;

  // Smazat všechny transakce vázané na tento trénink
  const removedMemberIds = new Set();
  state.transactions = state.transactions.filter(tx => {
    if (tx.trainingId === trainingId) {
      removedMemberIds.add(tx.memberId);
      return false;
    }
    return true;
  });

  // Vrátit trénink do stavu "open"
  t.status = 'open';
  t._settlementAttendees = [...(t.attendedIds || [])]; // předvyplnit kdo byl naposledy přítomen
  delete t.attendedIds;
  delete t.settledAt;

  // Přepočítat sálda všech dotčených členů
  removedMemberIds.forEach(id => recalcBalance(id));
  state.members.forEach(m => recalcBalance(m.id));

  // Save to Supabase
  await deleteTransactionsByTraining(trainingId);
  await saveTraining(t);
  for (const mid of removedMemberIds) {
    const m = getMember(mid);
    if (m) await saveMember(m);
  }

  showToast('↩ Zúčtování vráceno – můžeš opravit');
  closeModal();
  openSettleForm(trainingId);
}

function openSettleForm(id) {
  const t = getTraining(id);
  if (!t) return;
  if (t.status === 'settled') {
    showToast('Tento trénink už byl zúčtován');
    return;
  }

  // Initialize attendance state from registrations
  if (!t._settlementAttendees) {
    t._settlementAttendees = [...t.registrations];
  }

  renderSettlementUI(t);
}

function renderSettlementUI(t) {
  const attendees = t._settlementAttendees.map(id => getMember(id)).filter(Boolean);
  const priceText = t.price > 0
    ? `Každý zaplatí ${t.price} Kč`
    : t.price < 0
      ? `Každý dostane ${Math.abs(t.price)} Kč`
      : 'Bez vlivu na konto';

  const totalImpact = attendees.length * t.price;
  const impactText = totalImpact === 0
    ? ''
    : totalImpact > 0
      ? `Celkem se odečte ${totalImpact} Kč z ${attendees.length} kont`
      : `Celkem se přičte ${Math.abs(totalImpact)} Kč na ${attendees.length} kont`;

  const html = `
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="cancelSettlement('${t.id}')">×</button>
    <div class="modal-header">

function addToSettlement(trainingId, memberId) {
  const t = getTraining(trainingId);
  if (!t) return;

  }
  renderSettlementUI(t);
}

function cancelSettlement(trainingId) {

async function performSettlement(trainingId) {
  const t = getTraining(trainingId);
  if (!t) {
    showToast('Chyba: trénink nenalezen');
    return;
  }

  const attendedIds = t._settlementAttendees || [];

  if (attendedIds.length === 0) {
    if (!confirm('Nikdo nepřišel. Označit jako zúčtováno bez pohybů?')) return;
  }

  // Bezpečnostní kontrola: t.price musí být číslo
  const price = Number(t.price) || 0;

  let actualCount = 0;
  for (const memberId of attendedIds) {
    const member = getMember(memberId);
    if (!member) {
      console.warn('Member not found:', memberId);
      continue;
    }
    if (price === 0) {
      actualCount++;
      continue; // free training: jen označit, ale neúčtovat
    }
    const txType = price > 0 ? 'training_charge' : 'training_reward';
    await addTransaction({
      memberId,
      amount: -price,  // pokud price = 100 (odečte), tx = -100 → konto klesá
      type: txType,
      trainingId: t.id,
      description: `${t.venue} (${formatTrainingDate(t.datetime)})`,
      createdBy: state.currentUserId
    });
    actualCount++;
  }

  t.status = 'settled';
  t.attendedIds = attendedIds;
  t.settledAt = new Date().toISOString();
  delete t._settlementAttendees;

  // Přepočet všech sald pro jistotu
  state.members.forEach(m => recalcBalance(m.id));

  // Save training and all affected members (transactions are saved via addTransaction)
  await saveTraining(t);
  for (const memberId of attendedIds) {
    const member = getMember(memberId);
    if (member) await saveMember(member);
  }
  closeModal();
  const delta = price === 0 ? 'bez pohybů' :
                price > 0 ? `−${price} Kč × ${actualCount}` :
                `+${Math.abs(price)} Kč × ${actualCount}`;
  showToast(`✓ Zúčtováno: ${actualCount} členů (${delta})`);
  render();
}

async function saveMemberForm(editId) {
  const name = document.getElementById('m-name').value.trim();
  const email = document.getElementById('m-email').value.trim().toLowerCase();
  const isAdmin = document.getElementById('m-admin').checked;
  if (!name) {
    showToast('Vyplň jméno');
    return;
  }
  if (!email || !email.includes('@') || !email.includes('.')) {
    showToast('Zadej platný email');
    return;
  }
  // Kontrola duplicit emailu
  const duplicate = state.members.find(m => m.email && m.email.toLowerCase() === email && m.id !== editId);
  if (duplicate) {
    showToast(`Tento email už používá ${duplicate.name}`);
    return;
  }

  let memberToSave;
  if (editId) {
    const m = getMember(editId);
    m.name = name;
    m.email = email;
    m.isAdmin = isAdmin;
    memberToSave = m;
  } else {
    const balance = parseInt(document.getElementById('m-balance').value) || 0;
    const newMember = {
      id: genId(),
      name,
      email,
      isAdmin,
      balance: 0,
      createdAt: new Date().toISOString()
    };
    state.members.push(newMember);
    memberToSave = newMember;
    // Save member first, then add transaction (FK constraint)
    await saveMember(newMember);
    if (balance !== 0) {
      await addTransaction({
        memberId: newMember.id,
        amount: balance,
        type: 'initial_balance',
        description: 'Počáteční stav konta',
        createdBy: state.currentUserId
      });
    }
  }
  // For editing, save the updated member
  if (editId) await saveMember(memberToSave);
  closeModal();
  showToast(editId ? 'Člen uložen' : 'Člen přidán ✓');
  render();
}

async function deleteMember(id) {
  if (!confirm('Opravdu smazat tohoto člena? Smaže se i jeho historie.')) return;
  // Remove from local trainings
  const affectedTrainings = [];
  state.trainings.forEach(t => {
    const before = t.registrations.length + (t.declined || []).length;
    t.registrations = t.registrations.filter(memberId => memberId !== id);
    if (t.declined) t.declined = t.declined.filter(memberId => memberId !== id);
    const after = t.registrations.length + (t.declined || []).length;
    if (before !== after) affectedTrainings.push(t);
  });
  state.members = state.members.filter(m => m.id !== id);
  state.transactions = state.transactions.filter(t => t.memberId !== id);

  // Delete from Supabase (cascades transactions automatically via FK)
  await deleteMemberFromDb(id);
  // Save updated trainings
  for (const t of affectedTrainings) await saveTraining(t);

  closeModal();
  showToast('Člen smazán');
  render();
}

async function performBulkImport() {
  const text = document.getElementById('bulk-data').value.trim();
  if (!text) return;
  const lines = text.split('\n').filter(l => l.trim());
  let added = 0;
  let skippedNoEmail = 0;
  let skippedInvalid = 0;
  let skippedDuplicate = 0;
  const existingEmails = new Set(state.members.map(m => (m.email || '').toLowerCase()).filter(Boolean));
  const newMembers = [];

  for (const line of lines) {
    const parts = line.split(/[;,\t]/).map(p => p.trim());
    const name = parts[0];
    const email = (parts[1] || '').toLowerCase();
    if (!name) continue;
    if (!email) { skippedNoEmail++; continue; }
    if (!email.includes('@') || !email.includes('.')) { skippedInvalid++; continue; }
    if (existingEmails.has(email)) { skippedDuplicate++; continue; }
    existingEmails.add(email);
    const newMember = {
      id: genId(),
      name,
      email,
      isAdmin: false,
      balance: 0,
      createdAt: new Date().toISOString()
    };
    state.members.push(newMember);
    newMembers.push(newMember);
    added++;
  }
  if (newMembers.length > 0) await saveMembersBulk(newMembers);
  closeModal();
  let msg = `Importováno: ${added} členů`;
  const skipped = skippedNoEmail + skippedInvalid + skippedDuplicate;
  if (skipped > 0) {
    msg += ` (přeskočeno ${skipped}: ${skippedNoEmail ? skippedNoEmail + ' bez emailu' : ''}${skippedInvalid ? (skippedNoEmail ? ', ' : '') + skippedInvalid + ' neplatný' : ''}${skippedDuplicate ? ', ' + skippedDuplicate + ' duplicit' : ''})`;
  }
  showToast(msg);
  render();
}

async function saveSettings() {
  state.setup.clubName = document.getElementById('set-clubname').value.trim() || 'NaturClimb';
  state.setup.bankAccount = document.getElementById('set-bank').value.trim();
  state.setup.debtLimit = parseInt(document.getElementById('set-debt').value) || -500;
  state.setup.creditLimit = parseInt(document.getElementById('set-credit').value) || 500;
  await saveSetup();
  showToast('Nastavení uloženo ✓');
}

async function resetApp() {
  if (!confirm('OPRAVDU smazat všechna data? Tuto akci nelze vrátit.')) return;
  if (!confirm('Jsi si jistý? Smažou se všichni členové, tréninky i platby.')) return;
  await resetAllData();
  showToast('Aplikace resetována');
  render();
}

// ============================================
// MODAL
// ============================================
function openModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.id = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = html;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.remove();
  document.body.style.overflow = '';
}

// ============================================
// INIT
// ============================================
(async function init() {
  // Show loading state
  document.getElementById('app').innerHTML = `
    <div style="text-align: center; padding: 80px 20px; color: white; text-shadow: 0 2px 6px rgba(0,0,0,0.5);">
      <div style="font-size: 48px; margin-bottom: 16px;">🧗</div>
      <div style="font-family: 'Bricolage Grotesque', sans-serif; font-size: 20px;">Načítám...</div>
    </div>
  `;
  await loadAllData();
  render();
})();
</script>
